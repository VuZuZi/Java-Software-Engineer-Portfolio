# Local development profile that does not require a MySQL server.
spring.datasource.url=jdbc:h2:file:./data/portfolio-dev;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database=H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dev-client}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_SECRET:dev-secret}

jwt.secret=${JWT_SECRET:dev-secret-key-that-is-long-enough-32-chars}
