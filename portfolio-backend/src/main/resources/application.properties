# ===== JPA =====
spring.jpa.database=MYSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}

# ===== GOOGLE OAUTH2 =====
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

# ===== CLOUDINARY =====
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_SECRET:}

jwt.secret=${JWT_SECRET:change-me-to-a-strong-secret-at-least-32-chars}

# ===== DEVTOOLS =====
spring.devtools.livereload.enabled=${LIVE_RELOAD_ENABLED:true}
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
spring.devtools.restart.additional-paths=src/main/resources/static,src/main/resources/templates
