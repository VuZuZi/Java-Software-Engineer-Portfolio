<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Kỹ năng - Portfolio Platform</title>
</head>
<body>
<div th:replace="~{fragments/header :: header (currentPage='skill')}"></div>

<div class="container py-4">
    <div class="text-center mb-4">
        <h1><i class="fas fa-code me-2"></i>Kỹ năng của tôi</h1>
        <p class="text-muted">Các công nghệ và kỹ năng đã sử dụng</p>
    </div>

    <div class="row">
        <div class="col-md-6 col-lg-4 mb-3" th:each="skill : ${skills}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-2">
                        <i th:if="${skill.icon != null}" th:class="${skill.icon} + ' fa-2x me-3 text-primary'"></i>
                        <i th:if="${skill.icon == null}" class="fas fa-cog fa-2x me-3 text-primary"></i>
                        <h5 class="mb-0" th:text="${skill.name}">Skill Name</h5>
                    </div>
                    <p class="text-muted small" th:text="${skill.category}">Category</p>

                    <div class="mt-3">
                        <div class="d-flex justify-content-between small mb-1">
                            <span>Thành thạo</span>
                            <span th:text="${skill.proficiencyPercent != null ? skill.proficiencyPercent + '%' : 'N/A'}">-</span>
                        </div>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar bg-primary"
                                 th:style="'width: ' + (${skill.proficiencyPercent != null ? skill.proficiencyPercent : 0}) + '%'">
                            </div>
                        </div>
                    </div>

                    <div class="mt-2 text-muted small">
                        <i class="fas fa-calendar-alt me-1"></i>
                        Kinh nghiệm: <span th:text="${skill.yearsExperience != null ? skill.yearsExperience + ' năm' : 'N/A'}">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
