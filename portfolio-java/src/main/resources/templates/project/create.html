<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Thêm dự án</title>
</head>
<body>
<div th:replace="~{fragments/header :: header (currentPage='projects')}"></div>

<div class="container py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0">Thêm dự án mới</h4>
                </div>
                <div class="card-body">
                    <form method="post" action="/projects/create">
                        <div class="mb-3">
                            <label class="form-label">Tên dự án</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Công ty</label>
                            <input type="text" name="companyName" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Vị trí</label>
                            <input type="text" name="position" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Công nghệ</label>
                            <input type="text" name="technologies" class="form-control"
                                   placeholder="Java, Spring Boot, MySQL">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Link GitHub</label>
                            <input type="url" name="githubLink" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i> Lưu dự án
                        </button>
                        <a href="/projects" class="btn btn-secondary">Hủy</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
