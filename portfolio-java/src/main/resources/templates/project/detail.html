<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title th:text="${project.name}">Chi tiết dự án</title>
</head>
<body>
<div th:replace="~{fragments/header :: header (currentPage='projects')}"></div>

<div class="container py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div th:if="${project != null}" class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 th:text="${project.name}">Tên dự án</h2>
                    <hr>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <strong><i class="fas fa-building me-1"></i> Công ty:</strong>
                            <span th:text="${project.companyName}">-</span>
                        </div>
                        <div class="col-md-6">
                            <strong><i class="fas fa-briefcase me-1"></i> Vị trí:</strong>
                            <span th:text="${project.position}">-</span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <strong><i class="fas fa-code me-1"></i> Công nghệ:</strong>
                        <span th:text="${project.technologies}">-</span>
                    </div>

                    <div class="mb-3">
                        <strong><i class="fas fa-align-left me-1"></i> Mô tả:</strong>
                        <p class="mt-2" th:text="${project.description}">-</p>
                    </div>

                    <div class="mb-3" th:if="${project.githubLink}">
                        <strong><i class="fab fa-github me-1"></i> GitHub:</strong>
                        <a th:href="${project.githubLink}" target="_blank" th:text="${project.githubLink}">-</a>
                    </div>

                    <div class="mt-4">
                        <a href="/projects" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-1"></i> Quay lại
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${project == null}" class="alert alert-warning text-center">
                <i class="fas fa-exclamation-triangle me-2"></i> Không tìm thấy dự án!
                <br><a href="/projects" class="btn btn-sm btn-primary mt-2">Quay lại danh sách</a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
