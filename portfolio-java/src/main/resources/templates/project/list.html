<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Dự án - Portfolio</title>
</head>
<body>
<div th:replace="~{fragments/header :: header (currentPage='projects')}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-project-diagram me-2"></i>Dự án của tôi</h2>
        <a href="/projects/create" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i> Thêm dự án
        </a>
    </div>

    <div class="row">
        <div class="col-md-6 col-lg-4 mb-4" th:each="project : ${projects}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${project.name}">Tên dự án</h5>
                    <p class="card-text text-muted small" th:text="${project.description}">Mô tả</p>
                    <p class="text-muted small">
                        <i class="fas fa-building me-1"></i> <span th:text="${project.companyName}">Công ty</span>
                    </p>
                    <p class="text-muted small">
                        <i class="fas fa-briefcase me-1"></i> <span th:text="${project.position}">Vị trí</span>
                    </p>
                    <div class="mt-2">
                        <span class="badge bg-secondary me-1" th:each="tech : ${#strings.arraySplit(project.technologies, ',')}"
                              th:text="${tech}">Java</span>
                    </div>
                </div>
                <div class="card-footer bg-white border-0 pb-3">
                    <a th:href="'/projects/' + ${project.id}" class="btn btn-outline-primary w-100">
                        Xem chi tiết <i class="fas fa-arrow-right ms-1"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${projects.empty}" class="text-center py-5">
        <i class="fas fa-inbox fa-4x text-muted mb-3"></i>
        <p>Chưa có dự án nào. Hãy thêm dự án đầu tiên!</p>
    </div>
</div>

<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
