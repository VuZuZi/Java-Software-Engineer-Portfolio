<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'Portfolio Platform'">Portfolio Platform</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<!-- Header Fragment -->
<header th:fragment="header" class="p-3 mb-3 border-bottom bg-white shadow-sm">
    <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between">

            <!-- PHẦN HIỂN THỊ KHI ĐÃ ĐĂNG NHẬP -->
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center w-100">
                <!-- Logo cho đã đăng nhập -->
                <a href="/dashboard" class="d-flex align-items-center text-dark text-decoration-none me-4">
                    <img src="https://lh3.googleusercontent.com/a/ACg8ocLGBuhf95sDUbnO0l6mf8y7VRGhKx1mLHgJBW9rXNers35qipA=s96-c"
                         alt="Logo" width="40" height="40" class="rounded-circle me-2">
                    <span class="fs-4 fw-semibold">Portfolio</span>
                </a>

                <!-- Navigation Menu -->
                <ul class="nav me-auto">
                    <li>
                        <a href="/dashboard" class="nav-link px-3"
                           th:classappend="${currentPage == 'dashboard'} ? 'link-primary fw-semibold' : 'link-dark'">
                            <i class="fas fa-tachometer-alt me-1"></i> Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="/projects" class="nav-link px-3"
                           th:classappend="${currentPage == 'projects'} ? 'link-primary fw-semibold' : 'link-dark'">
                            <i class="fas fa-project-diagram me-1"></i> Dự án
                        </a>
                    </li>
                    <li>
                        <a href="/skills" class="nav-link px-3"
                           th:classappend="${currentPage == 'skills'} ? 'link-primary fw-semibold' : 'link-dark'">
                            <i class="fas fa-code me-1"></i> Kỹ năng
                        </a>
                    </li>
                    <li>
                        <a href="/profile" class="nav-link px-3"
                           th:classappend="${currentPage == 'profile'} ? 'link-primary fw-semibold' : 'link-dark'">
                            <i class="fas fa-user me-1"></i> Hồ sơ
                        </a>
                    </li>
                    <li>
                        <a href="/chat" class="nav-link px-3"
                           th:classappend="${currentPage == 'chat'} ? 'link-primary fw-semibold' : 'link-dark'">
                            <i class="fas fa-comments me-1"></i> Tin nhắn
                        </a>
                    </li>
                    <li sec:authorize="hasRole('ADMIN')">
                        <a href="/admin" class="nav-link px-3"
                           th:classappend="${currentPage == 'admin'} ? 'link-primary fw-semibold' : 'link-dark'">
                            <i class="fas fa-shield-alt me-1"></i> Admin
                        </a>
                    </li>
                </ul>

                <!-- Search Box -->
                <form class="d-flex me-3">
                    <input type="search" class="form-control search-box" placeholder="Tìm kiếm..." aria-label="Search">
                </form>

                <!-- User Dropdown -->
                <div class="dropdown text-end">
                    <a href="#" class="d-block link-dark text-decoration-none dropdown-toggle"
                       id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                        <img th:src="${user != null ? user.picture : 'https://via.placeholder.com/40'}"
                             alt="Avatar" width="40" height="40" class="rounded-circle border">
                    </a>
                    <ul class="dropdown-menu text-small shadow" aria-labelledby="dropdownUser1">
                        <li>
                            <div class="dropdown-item-text fw-semibold" th:text="${user != null ? user.name : 'Guest'}">
                                User Name
                            </div>
                        </li>
                        <li>
                            <div class="dropdown-item-text small text-muted" th:text="${user != null ? user.email : 'guest@example.com'}">
                                user@example.com
                            </div>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/dashboard">
                            <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                        </a></li>
                        <li><a class="dropdown-item" href="/profile">
                            <i class="fas fa-user me-2"></i> Hồ sơ
                        </a></li>
                        <li><a class="dropdown-item" href="/settings">
                            <i class="fas fa-cog me-2"></i> Cài đặt
                        </a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="/logout">
                            <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
                        </a></li>
                    </ul>
                </div>
            </div>

            <!-- PHẦN HIỂN THỊ KHI CHƯA ĐĂNG NHẬP -->
            <div sec:authorize="!isAuthenticated()" class="d-flex align-items-center justify-content-between w-100">
                <!-- Logo cho chưa đăng nhập -->
                <a href="/" class="d-flex align-items-center text-dark text-decoration-none">
                    <img src="https://lh3.googleusercontent.com/a/ACg8ocLGBuhf95sDUbnO0l6mf8y7VRGhKx1mLHgJBW9rXNers35qipA=s96-c"
                         alt="Logo" width="40" height="40" class="rounded-circle me-2">
                    <span class="fs-4 fw-semibold">Portfolio</span>
                </a>

                <!-- Nút đăng nhập -->
                <a href="/oauth2/authorization/google" class="btn btn-danger">
                    <i class="fab fa-google me-2"></i> Đăng nhập với Google
                </a>
            </div>

        </div>
    </div>
</header>

<!-- Bootstrap JS Bundle -->
<script th:fragment="scripts" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script th:src="@{/js/main.js}"></script>
</html>
