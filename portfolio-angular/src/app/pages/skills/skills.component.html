<main class="simple-page">
  <header class="topbar">
    <a routerLink="/" class="header-brand"><i class="fas fa-rocket"></i><span>Portfolio Vu.DD</span></a>
    <nav>
      <a routerLink="/">Trang chủ</a>
      <a routerLink="/dashboard">Dashboard</a>
      <a routerLink="/contact">Liên hệ</a>
    </nav>
  </header>

  <section class="page-heading">
    <h1><i class="fas fa-code me-2"></i>Kỹ năng của tôi</h1>
    <p>Các công nghệ và kỹ năng đã sử dụng</p>
  </section>

  <section class="skill-grid">
    @for (skill of skills; track skill.name) {
      <article class="skill-card">
        <div class="skill-title">
          <i [class]="skill.icon"></i>
          <div>
            <h2>{{ skill.name }}</h2>
            <p>{{ skill.category }}</p>
          </div>
        </div>
        <div class="progress-meta">
          <span>Thành thạo</span>
          <strong>{{ skill.percent }}%</strong>
        </div>
        <div class="progress-track">
          <div class="progress-fill" [style.width.%]="skill.percent"></div>
        </div>
        <p class="experience"><i class="fas fa-calendar-alt me-1"></i>Kinh nghiệm: {{ skill.years }} năm</p>
      </article>
    }
  </section>
</main>
